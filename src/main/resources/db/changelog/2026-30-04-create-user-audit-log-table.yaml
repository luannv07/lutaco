databaseChangeLog:
  - changeSet:
      id: a9b8c7d6-1111-4aaa-bbbb-222233334444
      author: luannv
      changes:

        - createTable:
            tableName: user_audit_logs
            columns:

              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: username
                  type: varchar(255)
                  constraints:
                    nullable: false

              - column:
                  name: user_agent
                  type: text

              - column:
                  name: client_ip
                  type: varchar(45)

              - column:
                  name: request_uri
                  type: varchar(255)

              - column:
                  name: method_name
                  type: varchar(255)

              - column:
                  name: execution_time_ms
                  type: bigint

              - column:
                  name: param_content
                  type: text

              - column:
                  name: created_date
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - createIndex:
            tableName: user_audit_logs
            indexName: idx_audit_username
            columns:
              - column:
                  name: username
        - createIndex:
            tableName: user_audit_logs
            indexName: idx_audit_created_date
            columns:
              - column:
                  name: created_date
        - createIndex:
            tableName: user_audit_logs
            indexName: idx_audit_uri
            columns:
              - column:
                  name: request_uri