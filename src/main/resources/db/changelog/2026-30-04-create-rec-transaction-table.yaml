databaseChangeLog:
  - changeSet:
      id: r1c2u3r4-0001
      author: luannv
      changes:

        - createTable:
            tableName: recurring_transactions
            columns:

              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              # ===== FK TRANSACTION =====
              - column:
                  name: transaction_id
                  type: varchar(36)
                  constraints:
                    nullable: false
                    unique: true

              # ===== DATE RANGE =====
              - column:
                  name: start_date
                  type: date
                  constraints:
                    nullable: false

              - column:
                  name: next_date
                  type: date

              # ===== ENUM (i18n via master_dictionary) =====
              - column:
                  name: frequent_type
                  type: varchar(50)
                  constraints:
                    nullable: false

              # ===== STATUS =====
              - column:
                  name: active_flg
                  type: boolean
                  defaultValueBoolean: true
                  constraints:
                    nullable: false

              # ===== AUDIT =====
              - column:
                  name: created_by
                  type: varchar(50)
                  defaultValue: system

              - column:
                  name: created_date
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP

              - column:
                  name: updated_by
                  type: varchar(50)
                  defaultValue: system

              - column:
                  name: updated_date
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
        # FK transaction
        - addForeignKeyConstraint:
            baseTableName: recurring_transactions
            baseColumnNames: transaction_id
            referencedTableName: transactions
            referencedColumnNames: id
            constraintName: fk_recurring_transactions_transaction
            onDelete: cascade

        # INDEX next_date (scheduler cực quan trọng)
        - createIndex:
            tableName: recurring_transactions
            indexName: idx_recurring_next_date
            columns:
              - column:
                  name: next_date

        # INDEX frequent_type
        - createIndex:
            tableName: recurring_transactions
            indexName: idx_recurring_type
            columns:
              - column:
                  name: frequent_type