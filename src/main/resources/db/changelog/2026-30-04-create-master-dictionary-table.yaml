databaseChangeLog:

  # =============================
  # 1. CREATE TABLE
  # =============================
  - changeSet:
      id: 9f3b2c1e-7a4d-4c6a-8b1e-2d5f9a7c1234
      author: luannv
      changes:
        - createTable:
            tableName: master_dictionary
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: dict_group
                  type: varchar(100)
                  constraints:
                    nullable: false
                  remarks: "Ví dụ: GENDER, USER_STATUS"

              - column:
                  name: code
                  type: varchar(100)
                  constraints:
                    nullable: false
                  remarks: "Ví dụ: MALE, FEMALE, ACTIVE"

              - column:
                  name: value_vi
                  type: varchar(255)
                  constraints:
                    nullable: false

              - column:
                  name: value_en
                  type: varchar(255)
                  constraints:
                    nullable: false

              - column:
                  name: active_flg
                  type: boolean
                  defaultValueBoolean: true

              - column:
                  name: display_order
                  type: int

              - column:
                  name: created_date
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP

              - column:
                  name: updated_date
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP

              - column:
                  name: created_by
                  type: varchar(50)
                  defaultValue: system

              - column:
                  name: updated_by
                  type: varchar(50)
                  defaultValue: system

        - addUniqueConstraint:
            tableName: master_dictionary
            columnNames: dict_group, code
            constraintName: uk_master_dictionary_group_code


  # =============================
