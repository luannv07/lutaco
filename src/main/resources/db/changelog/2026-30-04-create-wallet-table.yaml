databaseChangeLog:
  - changeSet:
      id: create-wallet-table
      author: luannv
      changes:
        - createTable:
            tableName: wallets
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: user_id
                  type: bigint
                  constraints:
                    nullable: false

              - column:
                  name: name
                  type: varchar(100)
                  constraints:
                    nullable: false

              - column:
                  name: description
                  type: varchar(255)

              - column:
                  name: initial_balance
                  type: bigint
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false

              - column:
                  name: balance
                  type: bigint
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false

              - column:
                  name: active_flg
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false

              - column:
                  name: created_by
                  type: varchar(50)
                  defaultValue: system

              - column:
                  name: created_date
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP

              - column:
                  name: updated_by
                  type: varchar(50)
                  defaultValue: system

              - column:
                  name: updated_date
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP

        - addForeignKeyConstraint:
            baseTableName: wallets
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_wallets_user
            onDelete: CASCADE

        - createIndex:
            tableName: wallets
            indexName: idx_wallets_user_id
            columns:
              - column:
                  name: user_id
  - changeSet:
      id: insert-wallets-data
      author: luannv
