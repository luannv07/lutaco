databaseChangeLog:
  - changeSet:
      id: c1d2e3f4-aaaa-4bbb-9ccc-123456789000
      author: luannv
      changes:

        - createTable:
            tableName: categories
            columns:

              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: category_code
                  type: varchar(100)
                  constraints:
                    nullable: false

              - column:
                  name: category_type
                  type: varchar(10)
                  constraints:
                    nullable: false

              - column:
                  name: parent_id
                  type: bigint

              - column:
                  name: active_flg
                  type: boolean
                  defaultValueBoolean: true
                  constraints:
                    nullable: false

              - column:
                  name: created_by
                  type: varchar(50)
                  defaultValue: system

              - column:
                  name: created_date
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP

              - column:
                  name: updated_by
                  type: varchar(50)
                  defaultValue: system

              - column:
                  name: updated_date
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP

        # ===== FK SELF =====
        - addForeignKeyConstraint:
            baseTableName: categories
            baseColumnNames: parent_id
            referencedTableName: categories
            referencedColumnNames: id
            constraintName: fk_categories_parent
            onDelete: SET NULL

        # ===== UNIQUE =====
        - addUniqueConstraint:
            tableName: categories
            columnNames: parent_id, category_code
            constraintName: uk_categories_parent_code

        # ===== INDEX =====
        - createIndex:
            tableName: categories
            indexName: idx_categories_type
            columns:
              - column:
                  name: category_type

        - createIndex:
            tableName: categories
            indexName: idx_categories_parent
            columns:
              - column:
                  name: parent_id

