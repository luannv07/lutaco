databaseChangeLog:

  - changeSet:
      id: 2026-17-05-add-insight-master-dictionary
      author: luannv
      changes:

        # ── INSIGHT_LEVEL ────────────────────────────────────────────────────────
        - insert:
            tableName: master_dictionary
            columns:
              - column: { name: dict_group, value: INSIGHT_LEVEL }
              - column: { name: code, value: SUCCESS }
              - column: { name: value_vi, value: "Tốt" }
              - column: { name: value_en, value: "Good" }
              - column: { name: display_order, valueNumeric: 1 }

        - insert:
            tableName: master_dictionary
            columns:
              - column: { name: dict_group, value: INSIGHT_LEVEL }
              - column: { name: code, value: WARN }
              - column: { name: value_vi, value: "Cảnh báo" }
              - column: { name: value_en, value: "Warning" }
              - column: { name: display_order, valueNumeric: 2 }

        - insert:
            tableName: master_dictionary
            columns:
              - column: { name: dict_group, value: INSIGHT_LEVEL }
              - column: { name: code, value: DANGER }
              - column: { name: value_vi, value: "Nguy hiểm" }
              - column: { name: value_en, value: "Danger" }
              - column: { name: display_order, valueNumeric: 3 }

        # ── INSIGHT_CODE ─────────────────────────────────────────────────────────
