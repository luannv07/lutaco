        - insert:
            tableName: master_dictionary
            columns:
              - column: { name: dict_group, value: INSIGHT_CODE }
              - column: { name: code, value: CATEGORY_DOMINANT }
              - column: { name: value_vi, value: "Danh mục chiếm ưu thế" }
