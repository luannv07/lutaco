databaseChangeLog:
  - changeSet:
      id: b2c3d4e5-f6a7-4abc-9def-334455667788
      author: luannv
      changes:

        - createTable:
            tableName: invalidated_tokens
            columns:

              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              # JWT ID (recommended approach)
              - column:
                  name: jti
                  type: varchar(36)
                  constraints:
                    nullable: false

              - column:
                  name: expiry_time
                  type: timestamp
                  constraints:
                    nullable: false

              # ===== BaseEntity style =====
              - column:
                  name: created_by
                  type: varchar(50)
                  defaultValue: system

              - column:
                  name: created_date
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP

              - column:
                  name: updated_by
                  type: varchar(50)
                  defaultValue: system

              - column:
                  name: updated_date
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP

        # UNIQUE JWT ID
        - addUniqueConstraint:
            tableName: invalidated_tokens
            columnNames: jti
            constraintName: uk_invalidated_tokens_jti

        # INDEX expiry cleanup job
        - createIndex:
            tableName: invalidated_tokens
            indexName: idx_invalidated_tokens_expiry
            columns:
              - column:
                  name: expiry_time