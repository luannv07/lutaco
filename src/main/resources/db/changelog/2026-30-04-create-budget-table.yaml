databaseChangeLog:
  - changeSet:
      id: f1a2b3c4-budget-001
      author: luannv
      changes:

        - createTable:
            tableName: budgets
            columns:

              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              # ===== FK USER =====
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false

              # ===== FK CATEGORY =====
              - column:
                  name: category_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              # ===== MONEY =====
              - column:
                  name: target_amount
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: actual_amount
                  type: BIGINT
                  constraints:
                    nullable: false

              # ===== ENUM =====
              - column:
                  name: period
                  type: VARCHAR(50)
                  constraints:
                    nullable: false

              - column:
                  name: status
                  type: VARCHAR(50)

              # ===== DATE RANGE =====
              - column:
                  name: start_date
                  type: DATE

              - column:
                  name: end_date
                  type: DATE

              # ===== PERCENTAGE =====
              - column:
                  name: percentage
                  type: DECIMAL(5,2)

              # ===== AUDIT (BaseEntity align) =====
              - column:
                  name: created_by
                  type: VARCHAR(50)
                  defaultValue: system

              - column:
                  name: created_date
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP

              - column:
                  name: updated_by
                  type: VARCHAR(50)
                  defaultValue: system

              - column:
                  name: updated_date
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP

        # ===== FK USER =====
        - addForeignKeyConstraint:
            baseTableName: budgets
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_budgets_user
            onDelete: CASCADE

        # ===== FK CATEGORY =====
        - addForeignKeyConstraint:
            baseTableName: budgets
            baseColumnNames: category_id
            referencedTableName: categories
            referencedColumnNames: id
            constraintName: fk_budgets_category
            onDelete: RESTRICT

        # ===== UNIQUE =====
        - addUniqueConstraint:
            tableName: budgets
            columnNames: user_id, category_id
            constraintName: uk_budget_user_category

        # ===== INDEX =====
        - createIndex:
            tableName: budgets
            indexName: idx_budget_user
            columns:
              - column:
                  name: user_id

        - createIndex:
            tableName: budgets
            indexName: idx_budget_category
            columns:
              - column:
                  name: category_id

        - createIndex:
            tableName: budgets
            indexName: idx_budget_status
            columns:
              - column:
                  name: status